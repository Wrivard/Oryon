appId: quebec.kua.oryon
productName: Oryon
copyright: Copyright © 2026 Wrivard

# Génère les métadonnées par canal (dev.yml en plus de latest.yml) → canal 'dev' possible.
generateUpdatesFilesForAllChannels: true

directories:
  output: release/${version}
  buildResources: build

# Le serveur MCP (lu par les agents) + son cœur partagé ne sont PAS dans l'asar (exclus par '!src/*').
# On les copie en ressources pour qu'ils existent en prod (cf. settings.ipc resolveMcpServerPath).
extraResources:
  - from: src/mcp
    to: mcp
  - from: src/shared
    to: shared

# On part de « tout inclus » et on EXCLUT les sources / configs / docs (out/ et node_modules de prod restent).
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!docs/*'
  - '!*.md'
  - '!{audit_buttons,check_contrast,check_interactive}.js'
  - '!final_a11y_audit.txt'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!electron-builder.yml'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json,tailwind.config.js,postcss.config.js}'
  - '!{.gitignore,.mcp.json}'
  - '!**/*.{tsbuildinfo}'

# Modules natifs : extraits de l'asar pour être chargeables (.node).
asarUnpack:
  - '**/node_modules/better-sqlite3/**'
  - '**/node_modules/@lydell/node-pty/**'
  - '**/*.node'

# Reconstruit les modules natifs pour la cible Electron.
npmRebuild: true

mac:
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  category: public.app-category.developer-tools
  icon: build/icon.png
  artifactName: ${productName}-${version}-${arch}.${ext}

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.png
  artifactName: ${productName}-${version}-Setup.${ext}

# Installeur one-click brandé (style Discord/VS Code) : un seul écran avec l'icône Oryon + barre de
# progression, installe par-utilisateur puis lance l'app. L'icône installeur/désinstalleur est dérivée
# automatiquement de win.icon (build/icon.png → .ico). One-click ⇒ les updates s'appliquent en silencieux.
nsis:
  oneClick: true
  perMachine: false
  deleteAppDataOnUninstall: false
  runAfterFinish: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Oryon

linux:
  target:
    - AppImage
    - deb
  category: Development
  icon: build/icon.png
  maintainer: Wrivard <wrivard@kua.quebec>
  artifactName: ${productName}-${version}.${ext}

# Auto-update via GitHub Releases (electron-updater lit app-update.yml généré ici).
publish:
  provider: github
  owner: Wrivard
  repo: Oryon
