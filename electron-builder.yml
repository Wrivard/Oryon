appId: quebec.kua.oryon
productName: Oryon
copyright: Copyright © 2026 Wrivard

# Génère les métadonnées par canal (dev.yml en plus de latest.yml) → canal 'dev' possible.
generateUpdatesFilesForAllChannels: true

directories:
  output: release/${version}
  buildResources: build

# Bundle le serveur MCP en un fichier AUTONOME (esbuild inline le SDK + zod + memory-core) AVANT le packaging.
# Sinon un node standalone hors du repo ne résout pas @modelcontextprotocol/sdk (asar) → « oryon · failed ».
beforePack: scripts/before-pack.cjs

# Le serveur MCP tourne hors de l'asar (process node séparé) → on copie le BUNDLE produit par beforePack,
# PAS la source src/mcp (dont les deps ne seraient pas résolvables). Le bundle inline memory-core (plus besoin
# de copier src/shared).
extraResources:
  - from: out/mcp
    to: mcp

# On part de « tout inclus » et on EXCLUT les sources / configs / docs (out/ et node_modules de prod restent).
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!docs/*'
  - '!*.md'
  - '!{audit_buttons,check_contrast,check_interactive}.js'
  - '!final_a11y_audit.txt'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!electron-builder.yml'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json,tailwind.config.js,postcss.config.js}'
  - '!{.gitignore,.mcp.json}'
  - '!**/*.{tsbuildinfo}'

# Modules natifs : extraits de l'asar pour être chargeables (.node).
asarUnpack:
  - '**/node_modules/better-sqlite3/**'
  - '**/node_modules/@lydell/node-pty/**'
  - '**/*.node'

# Reconstruit les modules natifs pour la cible Electron.
npmRebuild: true

mac:
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  category: public.app-category.developer-tools
  icon: build/icon.png
  artifactName: ${productName}-${version}-${arch}.${ext}

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.png
  artifactName: ${productName}-${version}-Setup.${ext}

# Installeur ASSISTÉ BRANDÉ : seul le mode assisté offre des pages (Welcome/Finish) où peindre la marque.
# Pages habillées Oryon sur fond #0a0a0f via les bitmaps build/ (BMP 24-bit, dims exactes) + icône .ico.
# Par-utilisateur, sans UAC (perMachine:false + allowElevation:false). L'auto-update reste 100% SILENCIEUX :
# updater.ts appelle quitAndInstall(isSilent=true) → l'installeur tourne en /S, aucune page n'apparaît ;
# le wizard brandé ne se voit qu'au premier install manuel.
nsis:
  oneClick: false
  perMachine: false
  allowElevation: false
  allowToChangeInstallationDirectory: false
  deleteAppDataOnUninstall: false
  runAfterFinish: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Oryon
  installerSidebar: build/installerSidebar.bmp
  installerHeader: build/installerHeader.bmp
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico

linux:
  target:
    - AppImage
    - deb
  category: Development
  icon: build/icon.png
  maintainer: Wrivard <wrivard@kua.quebec>
  artifactName: ${productName}-${version}.${ext}

# Auto-update via GitHub Releases (electron-updater lit app-update.yml généré ici).
# releaseType: release → la release est PUBLIÉE directement (pas en draft) : `release:stable` met l'update à
# disposition des apps installées sans étape manuelle « Publish » sur GitHub.
publish:
  provider: github
  owner: Wrivard
  # Feed de release PUBLIC séparé : le code reste dans Wrivard/Oryon (privé), seuls les installeurs + les
  # manifestes latest.yml/dev.yml vivent ici → l'app installée les lit ANONYMEMENT (pas de token embarqué).
  # Auto-update depuis un repo privé = impossible sans auth ; embarquer un token = extractible. D'où ce repo.
  repo: Oryon-releases
  releaseType: release
