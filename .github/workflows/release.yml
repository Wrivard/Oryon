name: Release

# Publie une release Windows quand on pousse un tag de version (ex. v0.1.2).
# Le flux : `npm run release:stable` bump la version + crée le tag + le pousse → ce workflow build
# l'installeur NSIS et le publie (avec latest.yml) dans les GitHub Releases de Wrivard/Oryon.
# L'app installée le voit alors depuis Réglages → Mises à jour (electron-updater lit ce repo public).
on:
  push:
    tags:
      - 'v*'

# Nécessaire pour qu'electron-builder crée/édite la release via le GITHUB_TOKEN d'Actions.
permissions:
  contents: write

jobs:
  build-win:
    # Pin explicite : GitHub redirige `windows-latest` vers l'image Windows Server 2025 (VS 2026) entre le 8 et le 15 juin 2026 → on épingle pour ne pas migrer d'image par surprise.
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      # node-gyp (rebuild natif d'uiohook-napi par electron-builder npmRebuild) a besoin de `distutils`, RETIRÉ de
      # Python 3.12+ que le runner windows-latest fournit par défaut → « ModuleNotFoundError: No module named
      # 'distutils' ». On épingle Python 3.11 (distutils inclus). (better-sqlite3/node-pty utilisent des prébuilts
      # reconnus → pas de compilation ; seul uiohook-napi est recompilé depuis les sources.)
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      # Installe les deps + rebuild natif (better-sqlite3 via postinstall ; node-pty via npmRebuild d'eb).
      - run: npm ci

      # electron-vite build + electron-builder --win --publish always.
      # GH_TOKEN = token d'Actions, scoped sur Wrivard/Oryon (= repo de publish) → push de la release autorisé.
      - name: Build + publish Windows installer
        run: npm run publish:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
